log_level: "info"
api_request_timeout_seconds: 1250
split_token_model_name_label: "@"
max_request_bytes: 16777216

variants:
  - name: "do-think-qwen"
    label: "do-think"
    model_regex: "^(?=.*[Qq]wen3).*"
    inject_at_end: "\n\n/think"
    weak_defaults:
      temperature: 0.6
    thinking:
      handling: "DISCARD"
      tag_pair: ["<think>", "</think>"]
      max_chars_before_opening: 8

  - name: "q35-instr"
    label: "instr"
    model_regex: "placeholder-wont-match"
    strong_overrides:
      temperature: 0.7
      top_p: 0.8

  - name: "q35-instr-lcpp"
    base_off: "q35-instr"
    label: "instr"
    model_regex: "^llamacpp-(?=.*[Qq]wen3.5).*"
    strong_overrides:
      chat_template_kwargs:  # chat_template_kwargs is llama.cpp specific
        enable_thinking: "false"

  - name: "q35-think-code"
    label: "think-code"
    model_regex: "placeholder-wont-match"
    strong_overrides:
      temperature: 0.6
      presence_penalty: 0.0
